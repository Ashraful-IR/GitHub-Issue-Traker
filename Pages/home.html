<!doctype html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>

    <!-- Font Import -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
        href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&family=Hind+Siliguri:wght@300;400;500;600;700&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap"
        rel="stylesheet" />

    <!-- Tailwind CSS -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- Deisy UI -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />

    <link rel="stylesheet" href="../Style/style.css" />
</head>

<body class="bg-[#f8fafc] h-screen">
    <header>
        <nav>
            <div
                class="navbar bg-base-100 shadow-sm flex flex-col border-b-[#e9e9e9] md:flex-row justify-between items-center gap-3 px-10 py-2">
                <div class="flex items-center gap-2">
                    <img src="../assets/github-logo.png" class="w-8 h-8" alt="" />
                    <span class="text-[20px] md:text-[24px] font-semibold text-[#1f2937]">
                        GitHub Issues Tracker
                    </span>
                </div>

                <div class="flex flex-col sm:flex-row gap-2 w-full md:w-auto md:justify-end">
                    <div class="relative flex items-center w-full sm:w-auto">
                        <i class="fas fa-search absolute z-1 left-3 top-3.5 text-[14px] text-[#64748b] opacity-40"></i>
                        <input type="text" placeholder="Search"
                            class="input input-bordered w-full text-[16px] text-[#64748b] px-8 sm:w-75 md:w-80" />
                    </div>

                    <button class="btn btn-primary w-full text-[16px] font-semibold text-[#ffffff] sm:w-auto">
                        <i class="fas fa-plus"></i> New Issue
                    </button>
                </div>
            </div>
        </nav>
    </header>

    <section
        class="buttons container mx-auto bg-[#ffffff] shadow-lg shadow-[#00000014] rounded-[8px] px-5 py-5 mt-10 gap-3 flex items-center justify-start">
        <button class="btn btn-primary">All</button>
        <button class="btn btn-outline border-[#d6d6d6ee]">Open</button>
        <button class="btn btn-outline border-[#d6d6d6ee]">Closed</button>
    </section>

    <section
        class="buttons container mx-auto bg-[#ffffff] shadow-lg shadow-[#00000014] rounded-[8px] px-5 py-5 mt-10 gap-3 flex items-center justify-between">
        <div class="flex justify-between items-center gap-3">
            <div class="bg-gray-400 w-12 rounded-full">
                <img src="../assets/Aperture.png" alt="Aperture Logo" class="w-12 h-12 rounded-full" />
            </div>

            <div>
                <p class="text-[20px] text-[#1f2937] font-semibold">50 Issues</p>
                <p class="text-[16px] text-[#64748b]">
                    Track and manage your project's issues
                </p>
            </div>
        </div>
        <div class="flex justify-between items-center gap-5">
            <p class="text-[16px] text-[#1f2937] font-medium">Open</p>
            <p class="text-[16px] text-[#1f2937] font-medium">Closed</p>
        </div>
    </section>
    <section id="All-Issues"
        class="buttons container mx-auto bg-[#f8fafc] shadow-lg shadow-[#00000014] rounded-[8px] px-5 py-5 mt-2 gap-3 items-center justify-between md:flex space-y-5 ">
        <div class="bg-white w-full rounded-lg p-5 gap-3 flex flex-col">
            <div class="flex justify-between items-center">
                <img src="../assets/Open-Status.png" alt="">
                <span class="text-[16px] text-[#fa0f36] font-medium bg-red-100 w-20 text-center rounded-full">High</span>
            </div>
            <div>
                <p class="text-[14px] font-semibold text-[#1f2937]">Fix navigation menu on mobile devices</p>
                <p class="text-[12px] text-[#64748b]">The navigation menu doesn't collapse properly on mobile devices...</p>
            </div>
            <div class="flex justify-start items-left gap-5">
                <div class="flex justify-start items-center gap-2 w-20 bg-red-200 " >
                    <p class="text-center">BUG</p>
                </div>
                <div class="flex  justify-start items-center gap-2 w-40 bg-red-200 ">
                    <p class="text-center">High Priority</p>
                </div>
            
            </div>
            <div class="w-full bg-black h-[1px]"></div>

            <div>
                <p>Ashraful islam</p>
                <p>Created on: 2024-06-15</p>
                <p>Last updated: 2024-06-15</p>
            </div>
        </div>
    </section>
    <script src="../Script/home.js"></script>
</body>

</html>
